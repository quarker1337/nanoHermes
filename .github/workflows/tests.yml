name: NanoHermes CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'MANIFEST.in'
      - 'infra/packaging/**'
      - '.github/workflows/tests.yml'
      - 'scripts/ci/nanohermes_registry_smoke.py'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'MANIFEST.in'
      - 'infra/packaging/**'
      - '.github/workflows/tests.yml'
      - 'scripts/ci/nanohermes_registry_smoke.py'
  workflow_dispatch:
    inputs:
      full_all_package_real_install:
        description: "Run the full default-registry all-package real install smoke. This can download runtime payloads such as Chrome."
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: nanohermes-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: package-manager smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dev dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Compile NanoHermes startup and package-manager modules
        run: |
          source .venv/bin/activate
          python -m py_compile \
            hermes_cli/main.py \
            hermes_cli/package_manager/__init__.py \
            hermes_cli/package_manager/cli.py \
            hermes_cli/package_manager/registry.py \
            hermes_cli/package_manager/state.py \
            infra/packaging/setup.py \
            scripts/ci/nanohermes_registry_smoke.py

      - name: Run NanoHermes package-manager regression tests
        run: |
          source .venv/bin/activate
          python -m pytest \
            tests/package_manager/test_package_manager_cli.py \
            tests/test_packaging_metadata.py \
            tests/tools/test_browser_chromium_check.py \
            tests/hermes_cli/test_update_check.py \
            tests/hermes_cli/test_pip_install_detection.py \
            -q -o 'addopts='
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  registry-smoke:
    name: default-registry representative smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Run representative default-registry package smoke
        run: python3 scripts/ci/nanohermes_registry_smoke.py --mode representative-no-pip
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  full-all-package-real-install:
    name: full default-registry all-package real install
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_all_package_real_install }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Run full all-package real install smoke
        run: python3 scripts/ci/nanohermes_registry_smoke.py --mode all-real
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
