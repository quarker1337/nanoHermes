name: NanoHermes CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'MANIFEST.in'
      - 'infra/packaging/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'MANIFEST.in'
      - 'infra/packaging/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nanohermes-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: package-manager smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dev dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Compile NanoHermes startup and package-manager modules
        run: |
          source .venv/bin/activate
          python -m py_compile \
            hermes_cli/main.py \
            hermes_cli/package_manager/__init__.py \
            hermes_cli/package_manager/cli.py \
            hermes_cli/package_manager/registry.py \
            hermes_cli/package_manager/state.py \
            infra/packaging/setup.py

      - name: Run NanoHermes package-manager regression tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/package_manager tests/test_packaging_metadata.py -q
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
